<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pedra, Papel e Tesoura</title>

<style>

body{
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

.container{
    border: 1px solid black;
    width: 700px;
    padding: 20px;
}

.opcoes{
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.opcoes button{
    width: 100px;
    height: 100px;
    font-size: 16px;
    cursor: pointer;
}

.area-jogo{
    display: flex;
    align-items: center;
    margin-top: 40px;
}

.caixa{
    width: 100px;
    height: 100px;
    border: 2px dashed gray;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 50px;
}

.vs{
    font-size: 50px;
    margin: 0 30px;
}

.labels{
    display: flex;
    gap: 140px;
    margin-top: 20px;
}

.placar{
    margin-top: 30px;
    width: 250px;
    border: 1px solid black;
}

.placar h3{
    margin: 0;
    border-bottom: 1px solid black;
}

.linha{
    display: flex;
}

.linha div{
    flex: 1;
    border: 1px solid black;
    text-align: center;
    padding: 5px;
}

#resultado{
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Jogo "pedra, papel, tesoura"</h1>

<h3>Escolha sua jogada</h3>

<div class="opcoes">
    <button onclick="jogar('Pedra')">🪨</button>
    <button onclick="jogar('Papel')">📄</button>
    <button onclick="jogar('Tesoura')">✂️</button>
</div>

<div class="labels">
    <span>Sua jogada</span>
    <span>Minha jogada (computador)</span>
</div>

<div class="area-jogo">

    <div class="caixa" id="jogador"></div>

    <div class="vs">X</div>

    <div class="caixa" id="computador"></div>

</div>

<div id="resultado"></div>

<div class="placar">

    <h3>Placar</h3>

    <div class="linha">
        <div>Você</div>
        <div>Computador</div>
    </div>

    <div class="linha">
        <div id="placarJogador">0</div>
        <div id="placarComputador">0</div>
    </div>

</div>

</div>

<script>

let pontosJogador = 0;
let pontosComputador = 0;

function jogar(escolhaJogador){

    let opcoes = ["Pedra","Papel","Tesoura"];

    let escolhaComputador =
    opcoes[Math.floor(Math.random()*3)];

    document.getElementById("jogador").innerHTML =
    simbolo(escolhaJogador);

    document.getElementById("computador").innerHTML =
    simbolo(escolhaComputador);

    let resultado;

    if(escolhaJogador == escolhaComputador){

        resultado = "Empate!";

    }

    else if(
        (escolhaJogador == "Pedra" && escolhaComputador == "Tesoura") ||
        (escolhaJogador == "Papel" && escolhaComputador == "Pedra") ||
        (escolhaJogador == "Tesoura" && escolhaComputador == "Papel")
    ){

        resultado = "Você venceu!";
        pontosJogador++;

    }

    else{

        resultado = "Computador venceu!";
        pontosComputador++;

    }

    document.getElementById("resultado").innerHTML =
    resultado;

    document.getElementById("placarJogador").innerHTML =
    pontosJogador;

    document.getElementById("placarComputador").innerHTML =
    pontosComputador;
}

function simbolo(opcao){

    if(opcao == "Pedra") return "🪨";

    if(opcao == "Papel") return "📄";

    return "✂️";
}

</script>

</body>
</html>
